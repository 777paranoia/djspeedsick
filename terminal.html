<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>terminal</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: "Courier New", "DejaVu Sans Mono", monospace;
        font-size: 14px;
        line-height: 1.3;
        color: #c8c8c8;
        user-select: text;
        -webkit-user-select: text;
      }
      #term {
        width: 100%;
        height: 100%;
        padding: 8px 10px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-all;
      }
      /* Login-screen centered layout */
      #term.login-mode {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 0;
      }
      #term.login-mode .line {
        text-align: center;
        width: auto;
      }
      .line {
        display: block;
      }
      .red {
        color: #c83232;
      }
      .yellow {
        color: #d8b020;
      }
      .cyan {
        color: #38b8c0;
      }
      .green {
        color: #50c050;
      }
      .dim {
        color: #707070;
      }
      .white {
        color: #f0f0f0;
      }
      #input-line {
        display: inline;
      }
      #input-text {
        display: inline;
        white-space: pre;
      }
      #caret {
        display: inline-block;
        width: 8px;
        height: 14px;
        background: #c8c8c8;
        vertical-align: text-bottom;
        margin-left: 1px;
        animation: blink 1s steps(2, start) infinite;
      }
      @keyframes blink {
        to {
          background: transparent;
        }
      }
      /* hidden real input to capture keystrokes */
      #real-input {
        position: absolute;
        left: -9999px;
        width: 1px;
        height: 1px;
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div id="term"></div>
    <input
      id="real-input"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    />

    <!-- LAPTOP CLOSE BUTTON — only appears when iframed -->
    <style>
      #__laptopClose {
        position: fixed;
        top: 8px;
        right: 8px;
        width: 22px;
        height: 22px;
        background: #c83232;
        color: #fff;
        font:
          bold 14px/22px "Courier New",
          monospace;
        text-align: center;
        cursor: pointer;
        z-index: 999999;
        border: 1px solid #000;
        box-sizing: border-box;
        user-select: none;
        display: none;
      }
      #__laptopClose:hover {
        background: #ff4040;
      }
      #__laptopClose:active {
        background: #a82020;
      }
    </style>
    <div id="__laptopClose" title="close">×</div>
    <script>
      (() => {
        const iframed = (() => {
          try {
            return window.self !== window.top;
          } catch (e) {
            return true;
          }
        })();
        const btn = document.getElementById("__laptopClose");
        if (iframed) {
          btn.style.display = "block";
          btn.addEventListener("click", () => {
            location.href = "desktop.html";
          });
        }
      })();
    </script>

    <script>
      (() => {
        const term = document.getElementById("term");
        const input = document.getElementById("real-input");

        let mode = "login_user";
        let buffer = "";
        let username = "";
        let confirmCallback = null;
        let confirmPrompt = "";
        const VALID_USER = "user182";
        const VALID_PASS = "blink";

        function appendLine(html) {
          const div = document.createElement("div");
          div.className = "line";
          div.innerHTML = html;
          term.appendChild(div);
          scrollBottom();
        }
        function appendText(text) {
          appendLine(escapeHTML(text));
        }
        function escapeHTML(s) {
          return s
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
        }
        function scrollBottom() {
          term.scrollTop = term.scrollHeight;
        }

        let liveLine = null;
        function setLive(promptHTML, showBuffer = true, mask = false) {
          if (!liveLine) {
            liveLine = document.createElement("div");
            liveLine.className = "line";
            term.appendChild(liveLine);
          }
          let visibleBuf = "";
          if (showBuffer) {
            visibleBuf = mask ? "*".repeat(buffer.length) : escapeHTML(buffer);
          }
          liveLine.innerHTML =
            promptHTML +
            '<span id="input-text">' +
            visibleBuf +
            "</span>" +
            '<span id="caret"></span>';
          scrollBottom();
        }
        function commitLive() {
          if (liveLine) {
            liveLine.querySelector("#caret")?.remove();
            liveLine = null;
          }
        }

        function showLoginUser() {
          mode = "login_user";
          buffer = "";
          setLive("FreeBSD/amd64 (freebsd) (ttyv0)\n\nlogin: ");
        }
        function showLoginPrePopulated() {
          username = VALID_USER;
          appendLine("FreeBSD/amd64 (freebsd) (ttyv0)");
          appendLine("");
          appendLine("login: " + escapeHTML(VALID_USER));
          showLoginPass();
        }
        function showLoginPass() {
          mode = "login_pass";
          buffer = "";
          setLive("Password: ", true, true);
        }
        function showShellPrompt() {
          mode = "shell";
          buffer = "";
          setLive(
            '<span class="green">' +
              escapeHTML(username) +
              '@freebsd</span>:<span class="cyan">~/Desktop</span>$ ',
          );
        }

        function neofetch() {
          const logo = [
            "   `````                       ",
            "  ` `.....---.......--.```-/   ",
            "  +o   .--`         /y:`      +.",
            "   yo`:.            :o      `+-",
            "    y/               -/`   -o/ ",
            "   .-                  ::/sy+:.",
            "   /                     `--  /",
            "  `:                          :",
            "  `:                          :",
            "   /                          /",
            "   .-                        -.",
            "    --                      -. ",
            "     `:`                  `:`  ",
            "       .--             `--.    ",
            "          .---.....----.       ",
          ];
          const info = [
            ["", ""],
            [username, "@freebsd"],
            ["---------------", ""],
            ["OS: ", "FreeBSD 14.1-RELEASE amd64"],
            ["Host: ", "ThinkPad X220"],
            ["Kernel: ", "14.1-RELEASE"],
            ["Uptime: ", "3 days, 7 hours, 41 mins"],
            ["Packages: ", "482 (pkg)"],
            ["Shell: ", "tcsh 6.24.07"],
            ["Resolution: ", "1366x768"],
            ["Terminal: ", "xterm-256color"],
            ["CPU: ", "Intel i5-2520M (4) @ 2.50GHz"],
            ["GPU: ", "Intel HD Graphics 3000"],
            ["Memory: ", "1247MiB / 4007MiB"],
            ["", ""],
            ["", ""],
          ];

          const maxLines = Math.max(logo.length, info.length);
          while (logo.length < maxLines) logo.push("");
          while (info.length < maxLines) info.push(["", ""]);

          appendLine("");
          for (let i = 0; i < maxLines; i++) {
            const logoCol = logo[i].padEnd(33, " ");
            const [label, value] = info[i];
            const labelHTML = label
              ? `<span class="yellow">${escapeHTML(label.replace(/:\s*$/, ""))}</span>${label.match(/:\s*$/) ? ": " : ""}`
              : "";
            const valueHTML = value
              ? `<span class="white">${escapeHTML(value)}</span>`
              : "";

            let infoHTML;
            if (i === 1) {
              infoHTML = `<span class="green">${escapeHTML(label)}</span><span class="white">${escapeHTML(value)}</span>`;
            } else if (i === 2) {
              infoHTML = `<span class="green">${escapeHTML(label)}</span>`;
            } else {
              infoHTML = labelHTML + valueHTML;
            }
            appendLine(
              `<span class="red">${escapeHTML(logoCol)}</span>${infoHTML}`,
            );
          }
          appendLine("");
        }

        const commands = {
          help() {
            appendText(
              "Available commands: help, clear, whoami, neofetch, uname, date, ls, pwd, unzip, logout, exit",
            );
          },
          clear() {
            term.innerHTML = "";
            liveLine = null;
          },
          whoami() {
            appendText(username);
          },
          neofetch() {
            neofetch();
          },
          uname() {
            appendText(
              "FreeBSD freebsd 14.1-RELEASE FreeBSD 14.1-RELEASE GENERIC amd64",
            );
          },
          date() {
            appendText(new Date().toString());
          },
          logout() {
            this.exit();
          },
          exit() {
            appendText("logout");
            username = "";

            setTimeout(() => {
              term.innerHTML = "";
              liveLine = null;
              showLoginUser();
            }, 500);
          },
          ls() {
            appendText("");
          },
          pwd() {
            appendText("/home/" + username + "/Desktop");
          },
          unzip(target) {
            if (!target) {
              appendText("unzip: missing argument");
              appendText("usage: unzip <file>");
              return;
            }
            if (target !== "solutions.zip") {
              appendText(
                "unzip: cannot find or open " +
                  target +
                  ", " +
                  target +
                  ".zip or " +
                  target +
                  ".ZIP.",
              );
              return;
            }

            mode = "busy";
            commitLive();
            appendText("Archive:  solutions.zip");
            const dotLine = document.createElement("div");
            dotLine.className = "line";
            dotLine.textContent = "expanding";
            term.appendChild(dotLine);
            scrollBottom();
            let dots = 0;
            const DOTS_TOTAL = 5;
            const DOT_INTERVAL = 320;
            const tick = () => {
              if (dots >= DOTS_TOTAL) {
                askConfirm(
                  "would you like to view contents of archive? y / n",
                  (ans) => {
                    if (ans === "y") {
                      showArchiveContents();
                    } else {
                      appendText("aborted.");
                      showShellPrompt();
                    }
                  },
                );
                return;
              }
              dotLine.textContent += " .";
              dots++;
              scrollBottom();
              setTimeout(tick, DOT_INTERVAL);
            };
            setTimeout(tick, DOT_INTERVAL);
          },
        };

        function askConfirm(promptText, cb) {
          mode = "confirm";
          buffer = "";
          confirmCallback = cb;
          confirmPrompt = promptText;
          setLive(escapeHTML(promptText) + " ");
        }

        const READOUT_LINES = [
          ".",
          ".",
          ".",
          ".",
          ".",
          ".",
          ".",
          ".",
          ".",
          ".",
          ".",
          ".",
          ".",
          "..",
          "...",
          "....",
          "......",
          "...........",
          "..................",
          "........................",
          ".............................",
          ". route.0x   ...................",
          ". bathroom mirror.",
          ". blink twice.",
          ". ",
          ". route.01",
          ". right, right, left, left",
          ".",
          ". route.02",
          ". right, right, left, right",
          ".",
          ". route.03",
          ". left, left, right, left ",
          ".",
          ". route.04",
          ". ",
          ". left, left, right, right.......",
          "                                ,",
          "                                ,",
          "                  . subroute.a  ,",
          "                  .",
          "                  . two (2) laps clockwise",
          "                  .",
          "                  .",
          "                  . subroute.b   ",
          "                  .",
          "                  . two (2) laps counterclockwise",
          "                  .",
          "                  .",
          "                  . subroute.c",
          "                  .",
          "                  . one (1) lap clockwise",
          "                  . one (1) lap counterclockwise",
          ". . . . . . . . . .",
          ".",
          ".",
          "..",
          "....",
          ".",
          "........",
          "...",
          ".............",
          "........",
          "...................",
          ".............",
          ".............................",
          "....................",
          "......................................",
          "......................",
          "........................................................",
          "................",
          "..........................................",
          "..........",
          ".......................",
          "......",
          "...........",
          "..",
          ".",
          ".",
          ".",
          ".",
          ".",
          ".",
          ".",
          "....",
          ".",
        ];
        const TYPE_CHAR_MS = 28;
        const TYPE_PUNCT_MS = 120;
        const TYPE_LINE_PAUSE_MS = 80;

        function typeLine(text, onDone) {
          const line = document.createElement("div");
          line.className = "line";

          if (text.length === 0) line.innerHTML = "&nbsp;";
          term.appendChild(line);
          let i = 0;
          const tick = () => {
            if (i >= text.length) {
              return setTimeout(onDone, TYPE_LINE_PAUSE_MS);
            }
            const ch = text[i++];
            line.textContent += ch;
            scrollBottom();
            const isPunct = /[.,;:!?]/.test(ch);
            setTimeout(tick, TYPE_CHAR_MS + (isPunct ? TYPE_PUNCT_MS : 0));
          };
          if (text.length === 0) {
            setTimeout(onDone, TYPE_LINE_PAUSE_MS);
          } else {
            tick();
          }
        }

        function showArchiveContents() {
          mode = "busy";
          commitLive();
          let idx = 0;
          const next = () => {
            if (idx >= READOUT_LINES.length) {
              showShellPrompt();
              return;
            }
            typeLine(READOUT_LINES[idx++], next);
          };
          next();
        }

        function runCommand(raw) {
          const trimmed = raw.trim();
          if (!trimmed) {
            showShellPrompt();
            return;
          }
          const [cmd, ...args] = trimmed.split(/\s+/);
          if (commands[cmd]) {
            commands[cmd].apply(commands, args);
          } else {
            appendText(cmd + ": command not found");
          }
          if (mode === "shell") showShellPrompt();
        }

        function handleEnter() {
          if (mode === "busy") {
            input.value = "";
            buffer = "";
            return;
          }
          if (mode === "confirm") {
            commitLive();
            const ans = buffer.trim().toLowerCase();
            if (ans === "y" || ans === "n") {
              const cb = confirmCallback;
              confirmCallback = null;
              cb(ans);
            } else {
              appendText("please answer y or n.");
              askConfirm(confirmPrompt, confirmCallback);
              const savedCb = confirmCallback;
              confirmCallback = savedCb;
            }
            return;
          }
          if (mode === "login_user") {
            commitLive();
            username = buffer;
            if (!buffer.trim()) {
              showLoginUser();
              return;
            }
            showLoginPass();
          } else if (mode === "login_pass") {
            commitLive();
            const passOK = buffer === VALID_PASS;
            const userOK = username === VALID_USER;
            if (passOK && userOK) {
              appendText("");
              appendLine(
                '<span class="dim">Last login: Sun Apr 26 14:22:08 on ttyv0</span>',
              );
              appendLine(
                '<span class="dim">FreeBSD 14.1-RELEASE (GENERIC) #0: Wed Apr  9 04:13:26 UTC 2025</span>',
              );
              appendLine("");
              appendLine('<span class="dim">Welcome to FreeBSD!</span>');
              appendLine("");

              neofetch();
              showShellPrompt();
            } else {
              appendLine("Login incorrect");
              appendLine("");
              showLoginUser();
            }
          } else if (mode === "shell") {
            commitLive();
            runCommand(buffer);
          }
        }

        function refreshLive() {
          if (mode === "busy") return;
          if (mode === "login_user") {
            setLive("FreeBSD/amd64 (freebsd) (ttyv0)\n\nlogin: ");
          } else if (mode === "login_pass") {
            setLive("Password: ", true, true);
          } else if (mode === "confirm") {
            setLive(escapeHTML(confirmPrompt) + " ");
          } else if (mode === "shell") {
            setLive(
              '<span class="green">' +
                escapeHTML(username) +
                '@freebsd</span>:<span class="cyan">~/Desktop</span>$ ',
            );
          }
        }

        input.addEventListener("input", () => {
          if (mode === "busy") {
            input.value = "";
            buffer = "";
            return;
          }
          buffer = input.value;
          refreshLive();
        });
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            handleEnter();
            input.value = "";
          } else if (e.key === "l" && e.ctrlKey) {
            e.preventDefault();
            commands.clear();
            refreshLive();
          } else if (e.key === "c" && e.ctrlKey) {
            e.preventDefault();

            commitLive();
            appendText("^C");
            input.value = "";
            buffer = "";
            if (mode === "login_user" || mode === "login_pass") showLoginUser();
            else showShellPrompt();
          }
        });

        function focusInput() {
          input.focus();
        }
        document.addEventListener("click", focusInput);
        document.addEventListener("keydown", focusInput);
        window.addEventListener("focus", focusInput);

        showLoginPrePopulated();
        setTimeout(focusInput, 50);
      })();
    </script>
    <script>
      (() => {
        let start = null;
        let sent = false;

        function sendSwipe() {
          if (sent) return;
          try {
            if (window.parent && window.parent !== window) {
              sent = true;
              window.parent.postMessage({ type: "laptop-screen-swipe" }, "*");
            }
          } catch (err) {}
        }

        document.addEventListener(
          "pointerdown",
          (e) => {
            if (e.button !== 0) return;
            start = { x: e.clientX, y: e.clientY };
            sent = false;
          },
          true,
        );

        document.addEventListener(
          "pointermove",
          (e) => {
            if (!start || sent) return;
            const dx = e.clientX - start.x;
            const dy = e.clientY - start.y;
            if (dx > 72 && Math.abs(dx) > Math.abs(dy) * 1.45) sendSwipe();
          },
          true,
        );

        function reset() {
          start = null;
          sent = false;
        }

        document.addEventListener("pointerup", reset, true);
        document.addEventListener("pointercancel", reset, true);
      })();
    </script>
  </body>
</html>
