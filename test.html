<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Zone4 Test</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
}
canvas {
  display: block;
  width: 100vw;
  height: 100vh;
  outline: none;
  cursor: grab;
}
canvas:active {
  cursor: grabbing;
}
</style>
</head>
<body>
<canvas id="c" tabindex="1"></canvas>

<script>
var IS_MOBILE =
  /Mobi|Android|iPhone|iPad|iPod|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
  (navigator.maxTouchPoints > 1 && window.innerWidth < 1024);

var canvas = document.getElementById("c");
var gl = canvas.getContext("webgl", {
  antialias: false,
  alpha: false,
  preserveDrawingBuffer: false
}) || canvas.getContext("experimental-webgl");

if (!gl) {
  document.body.textContent = "WebGL unavailable";
  throw new Error("WebGL unavailable");
}

function fit() {
  var dpr = IS_MOBILE ? Math.min(1, window.devicePixelRatio || 1) : Math.min(2, window.devicePixelRatio || 1);
  canvas.width = Math.floor(window.innerWidth * dpr);
  canvas.height = Math.floor(window.innerHeight * dpr);
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener("resize", fit);
fit();

canvas.focus();
canvas.addEventListener("mousedown", function () {
  canvas.focus();
});

window.mx = 0;
window.my = 0;

var dragging = false;

function clamp(v, lo, hi) {
  return Math.max(lo, Math.min(hi, v));
}

canvas.addEventListener("mousedown", function () {
  dragging = true;
});

window.addEventListener("mouseup", function () {
  dragging = false;
});

window.addEventListener("mousemove", function (e) {
  if (!dragging) return;
  window.mx = clamp(window.mx + e.movementX * 0.0025, -1.25, 1.25);
  window.my = clamp(window.my + e.movementY * 0.0025, -1.25, 1.25);
});

function compile(type, src) {
  var s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    gl.deleteShader(s);
    return null;
  }
  return s;
}

function loadStaticTex(path) {
  var tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(
    gl.TEXTURE_2D,
    0,
    gl.RGBA,
    1,
    1,
    0,
    gl.RGBA,
    gl.UNSIGNED_BYTE,
    new Uint8Array([0, 0, 0, 255])
  );
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

  var img = new Image();
  img.crossOrigin = "anonymous";
  img.onload = function () {
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
  };
  img.src = path;
  return tex;
}

window.__ALL_VIDEOS = window.__ALL_VIDEOS || [];

window.__registerVideo = function (v) {
  try {
    v.muted = true;
    v.playsInline = true;
    v.loop = !!v.loop;
    v.preload = "auto";
    v.autoplay = true;
    v.setAttribute("playsinline", "");
    v.setAttribute("webkit-playsinline", "");
    window.__ALL_VIDEOS.push(v);
  } catch (e) {}
  return v;
};

window.__unlockAllVideos = function () {
  var vids = window.__ALL_VIDEOS || [];
  for (var i = 0; i < vids.length; i++) {
    try {
      vids[i].muted = true;
      vids[i].playsInline = true;
      vids[i].setAttribute("playsinline", "");
      vids[i].setAttribute("webkit-playsinline", "");
      var p = vids[i].play();
      if (p && p.catch) p.catch(function () {});
    } catch (e) {}
  }
};

window.__claimPoolVid = function () {
  return null;
};

window.__mobileWalkZoneContains = function (x, y) {
  var w = window.innerWidth;
  return y >= 0.68 * window.innerHeight && x >= 0.3 * w && x <= 0.7 * w;
};

function updateTouchLook(ev) {
  if (!ev.touches || !ev.touches.length) return;
  var t = ev.touches[0];
  if (window.__mobileWalkZoneContains(t.clientX, t.clientY)) return;
  var nx = (t.clientX / window.innerWidth) * 2 - 1;
  var ny = (t.clientY / window.innerHeight) * 2 - 1;
  window.mx = clamp(nx * 0.9, -1.25, 1.25);
  window.my = clamp(ny * 0.9, -1.25, 1.25);
}

window.addEventListener("touchstart", function (ev) {
  updateTouchLook(ev);
  window.__unlockAllVideos();
}, { passive: true });

window.addEventListener("touchmove", function (ev) {
  updateTouchLook(ev);
}, { passive: true });

window.addEventListener("pointerdown", function () {
  window.__unlockAllVideos();
  canvas.focus();
}, { passive: true });
</script>

<script src="modes/mode-elevator.js"></script>
<script src="modes/mode-station.js"></script>
<script src="engine4.js"></script>

<script>
window.addEventListener("load", function () {
  if (typeof window.startZone4 === "function") {
    window.startZone4();
  } else {
    console.error("[Zone4] startZone4() not found.");
  }
});
</script>
</body>
</html>
