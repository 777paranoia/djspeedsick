<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Colossal Black Hole Rail Walk</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<script>
window.GLSL = window.GLSL || {};
window.GLSL.modules = window.GLSL.modules || {};

GLSL.modules.z2_alt_blackhole = `
precision highp float;

uniform vec2  u_resolution;
uniform float u_time;
uniform float u_yaw;
uniform float u_pitch;
uniform vec3  u_camPos;
uniform float u_movePhase;
uniform float u_speed;

const int   MARCH_STEPS = 96;
const int   BEND_STEPS  = 26;
const float FAR_CLIP    = 14000.0;
const float EPS         = 0.045;

const vec3  BH_CENTER   = vec3(0.0, 0.0, -3200.0);
const float BH_RADIUS   = 520.0;

mat2 rot(float a){
  float c = cos(a), s = sin(a);
  return mat2(c,-s,s,c);
}

float hash1(float p){
  return fract(sin(p * 127.1) * 43758.5453123);
}

float hash2(vec2 p){
  return fract(sin(dot(p, vec2(127.1,311.7))) * 43758.5453123);
}

float hash3(vec3 p){
  return fract(sin(dot(p, vec3(127.1,311.7,191.999))) * 43758.5453123);
}

float noise3(vec3 p){
  vec3 i = floor(p);
  vec3 f = fract(p);
  f = f*f*(3.0-2.0*f);

  float n000 = hash3(i + vec3(0.0,0.0,0.0));
  float n100 = hash3(i + vec3(1.0,0.0,0.0));
  float n010 = hash3(i + vec3(0.0,1.0,0.0));
  float n110 = hash3(i + vec3(1.0,1.0,0.0));
  float n001 = hash3(i + vec3(0.0,0.0,1.0));
  float n101 = hash3(i + vec3(1.0,0.0,1.0));
  float n011 = hash3(i + vec3(0.0,1.0,1.0));
  float n111 = hash3(i + vec3(1.0,1.0,1.0));

  float nx00 = mix(n000,n100,f.x);
  float nx10 = mix(n010,n110,f.x);
  float nx01 = mix(n001,n101,f.x);
  float nx11 = mix(n011,n111,f.x);

  float nxy0 = mix(nx00,nx10,f.y);
  float nxy1 = mix(nx01,nx11,f.y);

  return mix(nxy0,nxy1,f.z);
}

float fbm2(vec3 p){
  float v = 0.0;
  v += 0.65 * noise3(p);
  p *= 2.05;
  v += 0.35 * noise3(p);
  return v;
}

vec3 camForward(float yaw, float pitch){
  vec3 f = vec3(0.0,0.0,-1.0);
  f.xz *= rot(yaw);
  f.yz *= rot(pitch);
  return normalize(f);
}

vec3 camRight(vec3 fwd){
  return normalize(cross(fwd, vec3(0.0,1.0,0.0)));
}

vec3 camUp(vec3 fwd, vec3 right){
  return normalize(cross(right, fwd));
}

float pathCenterX(float z){
  float k = clamp((-z - 50.0) / 2800.0, 0.0, 1.0);
  return sin(z * 0.00165 + 0.7) * 22.0 * k + sin(z * 0.006 + 1.8) * 3.5;
}

float pathCenterY(float z){
  return -1.25 + smoothstep(-2400.0, -3100.0, z) * 30.0;
}

float pathHalfWidth(float z){
  float t = clamp((-z - 20.0) / 3300.0, 0.0, 1.0);
  return mix(1.3, 18.0, t * t);
}

float sdWalkway(vec3 p){
  float cx = pathCenterX(p.z);
  float cy = pathCenterY(p.z);
  float width = pathHalfWidth(p.z);
  float thickness = 0.09 + smoothstep(-2900.0, -3200.0, p.z) * 0.55;

  vec3 q = p - vec3(cx, cy, 0.0);
  float d = max(abs(q.y) - thickness, abs(q.x) - width);
  float edgeNoise = (noise3(vec3(q.x * 0.16, q.y * 2.2, p.z * 0.012)) - 0.5) * 0.045;
  return d + edgeNoise;
}

float sdSphere(vec3 p, vec3 c, float r){
  return length(p - c) - r;
}

vec2 sceneSDF(vec3 p){
  float dPath = sdWalkway(p);
  float dBH   = sdSphere(p, BH_CENTER, BH_RADIUS);
  return (dPath < dBH) ? vec2(dPath,1.0) : vec2(dBH,2.0);
}

vec3 estimateNormal(vec3 p){
  vec2 e = vec2(0.012,0.0);
  float dx = sceneSDF(p + vec3(e.x,e.y,e.y)).x - sceneSDF(p - vec3(e.x,e.y,e.y)).x;
  float dy = sceneSDF(p + vec3(e.y,e.x,e.y)).x - sceneSDF(p - vec3(e.y,e.x,e.y)).x;
  float dz = sceneSDF(p + vec3(e.y,e.y,e.x)).x - sceneSDF(p - vec3(e.y,e.y,e.x)).x;
  return normalize(vec3(dx,dy,dz));
}

vec3 cosmos(vec3 rd, vec3 ro){
  vec3 d = normalize(rd);
  vec3 col = vec3(0.0);

  vec3 p1 = normalize(d * 900.0 + ro * 0.012);
  vec3 p2 = normalize(d * 1600.0 + ro * 0.020 + vec3(17.3,-9.1,5.7));

  float h1 = hash3(floor(p1 * 320.0));
  float h2 = hash3(floor(p2 * 520.0));

  float starsA = smoothstep(0.9982, 1.0, h1);
  float starsB = smoothstep(0.9993, 1.0, h2);

  col += vec3(0.80,0.86,0.96) * starsA * 0.65;
  col += vec3(0.72,0.76,0.92) * starsB * 0.35;

  vec3 neb = d * 7.0 + ro * vec3(0.0007,0.0003,0.0009);
  float band = smoothstep(0.42,0.0,abs(d.y + sin(d.x * 2.4 + ro.z * 0.0002) * 0.16));
  float gal1 = noise3(neb + vec3(0.0,u_time * 0.005,0.0));
  float gal2 = noise3(neb * 1.9 + vec3(4.2,-2.3,7.7));
  float gal3 = noise3(neb * 0.8 + vec3(-3.4, 2.0, -6.1));

  col += vec3(0.10,0.13,0.22) * gal1 * band * 0.90;
  col += vec3(0.08,0.10,0.18) * gal2 * band * 0.70;
  col += vec3(0.04,0.06,0.12) * gal3 * band * 0.55;

  float overcast = smoothstep(0.85, -0.10, d.y);
  col += vec3(0.05,0.07,0.12) * overcast * 0.50;

  return col;
}

vec3 accretionGlow(vec3 p, float closestR){
  vec3 rel = p - BH_CENTER;
  float r = length(rel);
  float plane = abs(rel.y);
  float ringRadius = length(rel.xz);

  float disk = exp(-plane * 0.085) * smoothstep(BH_RADIUS * 2.6, BH_RADIUS * 1.08, ringRadius);
  float innerCut = smoothstep(BH_RADIUS * 1.02, BH_RADIUS * 1.30, ringRadius);
  disk *= innerCut;

  float swirl = 0.55 + 0.45 * sin(atan(rel.z, rel.x) * 7.0 - u_time * 0.8 + ringRadius * 0.008);
  float turbulence = noise3(rel * vec3(0.006,0.03,0.006) + vec3(0.0,u_time * 0.03,0.0));

  vec3 ember = vec3(1.02,0.42,0.12);
  vec3 hot   = vec3(1.05,0.63,0.26);
  vec3 rim   = vec3(0.34,0.40,0.76);
  float temp = smoothstep(BH_RADIUS * 1.15, BH_RADIUS * 2.2, ringRadius);

  vec3 glow = mix(ember, hot, temp) * disk * (0.72 + 0.48 * swirl + 0.30 * turbulence);

  float photonShell = exp(-abs(r - BH_RADIUS * 1.55) * 0.022) * smoothstep(0.7,0.0,plane * 0.05);
  glow += rim * photonShell * 0.22;

  float lens = smoothstep(BH_RADIUS * 4.2, BH_RADIUS * 1.0, closestR);
  glow += vec3(0.10,0.12,0.24) * disk * lens * 0.08;

  return glow * 0.013;
}

vec3 walkwayMaterial(vec3 p, vec3 rd, vec3 n){
  float z = p.z;
  float width = pathHalfWidth(z);
  float cx = pathCenterX(z);
  float localX = p.x - cx;
  float edge = abs(localX / max(width,0.0001));
  float edgeFade = 1.0 - smoothstep(0.80,1.02,edge);

  float grain = fbm2(vec3(p.x * 0.8, p.y * 10.0, p.z * 0.04));

  float seg = 1.0 - smoothstep(0.0,0.18,abs(fract((p.z + 1000.0) * 0.060) - 0.5));
  float fastSeg = 1.0 - smoothstep(0.0,0.10,abs(fract((p.z + 1000.0) * 0.16) - 0.5));

  float centerLine = 1.0 - smoothstep(0.0,0.10,abs(localX));
  float laneGlow = centerLine * (0.04 + 0.07 * seg);

  float edgeGlow = smoothstep(0.90,0.98,edge) * (0.06 + 0.14 * fastSeg);

  float nearPulse = smoothstep(-600.0,300.0,p.z) * (0.4 + 0.6 * sin(u_movePhase * 12.0 + p.z * 0.10));
  float forwardFlow = fastSeg * nearPulse * u_speed;

  vec3 base   = vec3(0.015,0.018,0.024);
  vec3 detail = vec3(0.028,0.034,0.046) * grain * 0.72;
  vec3 line   = vec3(0.10,0.11,0.16) * seg * 0.13;
  vec3 center = vec3(0.14,0.15,0.22) * laneGlow;
  vec3 edges  = vec3(0.18,0.20,0.32) * edgeGlow;
  vec3 motion = vec3(0.18,0.20,0.34) * forwardFlow * 0.10;

  float fres = pow(1.0 - max(dot(-rd, n), 0.0), 3.0);
  vec3 rim = vec3(0.08,0.10,0.16) * fres * 0.22;

  vec3 col = (base + detail + line + center + edges + motion + rim) * edgeFade;

  float horizonTint = smoothstep(-2800.0,-3200.0,z);
  col += vec3(0.06,0.07,0.12) * horizonTint * 0.24;
  col += vec3(0.03,0.04,0.08) * horizonTint * 0.16;

  float warmBounce = smoothstep(BH_RADIUS * 2.9, BH_RADIUS * 1.5, length(p - BH_CENTER));
  col += vec3(0.07,0.04,0.02) * warmBounce * 0.06;

  return col;
}

void main(){
  vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / u_resolution.y;

  vec3 ro = u_camPos;
  vec3 fwd = camForward(u_yaw, u_pitch);
  vec3 right = camRight(fwd);
  vec3 up = camUp(fwd, right);
  vec3 rd = normalize(fwd + right * uv.x + up * uv.y);

  vec3 p = ro;
  vec3 col = vec3(0.0);

  float traveled = 0.0;
  float closestR = 1e9;
  bool hit = false;
  float hitMat = 0.0;

  for(int i=0; i<MARCH_STEPS; i++){
    vec3 toBH = BH_CENTER - p;
    float r = length(toBH);
    closestR = min(closestR, r);

    if(r < BH_RADIUS){
      col = vec3(0.0);
      hit = true;
      hitMat = 2.0;
      break;
    }

    float grav = clamp((BH_RADIUS * 16.0) / (r * r), 0.0, 0.040);
    rd = normalize(mix(rd, normalize(toBH), grav));

    vec2 s = sceneSDF(p);
    float d = s.x;

    if(r < BH_RADIUS * 4.8 && mod(float(i), 2.0) < 0.5){
      col += accretionGlow(p, closestR);
    }

    if(d < EPS){
      hit = true;
      hitMat = s.y;
      break;
    }

    float stepLen = clamp(d * 0.95, 0.75, 78.0);
    stepLen *= 1.0 + smoothstep(BH_RADIUS * 5.5, FAR_CLIP, r) * 1.55;

    p += rd * stepLen;
    traveled += stepLen;

    if(traveled > FAR_CLIP) break;
  }

  if(hit && hitMat == 1.0){
    vec3 n = estimateNormal(p);
    vec3 matCol = walkwayMaterial(p, rd, n);
    col += matCol;

    float bhDist = length(p - BH_CENTER);
    float bounce = smoothstep(BH_RADIUS * 2.2, BH_RADIUS * 1.25, bhDist);
    col += vec3(0.04,0.05,0.10) * bounce * 0.10;
  } else if(!hit){
    vec3 bent = rd;
    vec3 rp = ro;
    float bendClosest = 1e9;

    for(int i=0; i<BEND_STEPS; i++){
      vec3 toBH = BH_CENTER - rp;
      float r = length(toBH);
      bendClosest = min(bendClosest, r);

      if(r < BH_RADIUS * 1.03) break;

      float grav = clamp((BH_RADIUS * 14.0) / (r * r), 0.0, 0.032);
      bent = normalize(mix(bent, normalize(toBH), grav));

      float stepLen = clamp(r * 0.15, 34.0, 180.0);
      rp += bent * stepLen;

      if(length(rp - ro) > FAR_CLIP) break;
    }

    vec3 bg = cosmos(bent, ro);
    float lensRing = exp(-abs(bendClosest - BH_RADIUS * 1.68) * 0.018);
    bg += vec3(0.16,0.20,0.34) * lensRing * 0.34;

    float shadow = smoothstep(BH_RADIUS * 1.30, BH_RADIUS * 0.96, bendClosest);
    bg *= 1.0 - shadow;

    col += bg;
  }

  float vign = 1.0 - smoothstep(0.95, 1.65, length(uv));
  col *= 0.84 + 0.16 * vign;

  col = 1.0 - exp(-col * 1.10);
  col = pow(max(col, 0.0), vec3(0.99));

  gl_FragColor = vec4(col, 1.0);
}
`;

(() => {
  const canvas = document.getElementById("c");
  const gl = canvas.getContext("webgl", {
    antialias: false,
    alpha: false,
    depth: false,
    stencil: false,
    preserveDrawingBuffer: false,
    powerPreference: "low-power"
  });

  if (!gl) {
    document.body.innerHTML = '<div style="color:#fff;font-family:monospace;padding:20px">WebGL unavailable.</div>';
    return;
  }

  const TARGET_FPS = 30;
  const FRAME_MS = 1000 / TARGET_FPS;

  function fit() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.max(320, Math.floor(window.innerWidth * dpr * 0.86));
    canvas.height = Math.max(180, Math.floor(window.innerHeight * dpr * 0.86));
    gl.viewport(0, 0, canvas.width, canvas.height);
  }

  window.addEventListener("resize", fit, { passive: true });
  fit();

  const vertSrc = `
    attribute vec2 p;
    void main() {
      gl_Position = vec4(p, 0.0, 1.0);
    }
  `;

  const fragSrc = GLSL.modules.z2_alt_blackhole;

  function compile(type, src) {
    const sh = gl.createShader(type);
    gl.shaderSource(sh, src);
    gl.compileShader(sh);
    if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
      throw new Error(gl.getShaderInfoLog(sh) || "Shader compile error");
    }
    return sh;
  }

  const prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);

  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    throw new Error(gl.getProgramInfoLog(prog) || "Program link error");
  }

  gl.useProgram(prog);

  const quad = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, quad);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
    -1, -1,
     3, -1,
    -1,  3
  ]), gl.STATIC_DRAW);

  const pLoc = gl.getAttribLocation(prog, "p");
  gl.enableVertexAttribArray(pLoc);
  gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

  const loc = {
    resolution: gl.getUniformLocation(prog, "u_resolution"),
    time: gl.getUniformLocation(prog, "u_time"),
    camPos: gl.getUniformLocation(prog, "u_camPos"),
    yaw: gl.getUniformLocation(prog, "u_yaw"),
    pitch: gl.getUniformLocation(prog, "u_pitch"),
    movePhase: gl.getUniformLocation(prog, "u_movePhase"),
    speed: gl.getUniformLocation(prog, "u_speed")
  };

  const state = {
    x: 0,
    y: 0.35,
    z: 70,
    yaw: 0,
    pitch: -0.03,
    moving: false,
    lookX: 0,
    lookY: 0,
    bobPhase: 0
  };

  function reset() {
    state.x = 0;
    state.y = 0.35;
    state.z = 70;
    state.yaw = 0;
    state.pitch = -0.03;
    state.lookX = 0;
    state.lookY = 0;
    state.moving = false;
    state.bobPhase = 0;
  }

  window.addEventListener("keydown", (e) => {
    if (e.code === "Space") {
      state.moving = true;
      e.preventDefault();
    }
    if (e.code === "KeyR") {
      reset();
    }
  });

  window.addEventListener("keyup", (e) => {
    if (e.code === "Space") state.moving = false;
  });

  window.addEventListener("mousemove", (e) => {
    const nx = (e.clientX / window.innerWidth) * 2 - 1;
    const ny = (e.clientY / window.innerHeight) * 2 - 1;
    state.lookX = nx;
    state.lookY = ny;
  }, { passive: true });

  function pathXjs(z) {
    const k = Math.max(0, Math.min(1, (-z - 50.0) / 2800.0));
    return Math.sin(z * 0.00165 + 0.7) * 22.0 * k + Math.sin(z * 0.006 + 1.8) * 3.5;
  }

  function pathYjs(z) {
    const t = Math.max(0, Math.min(1, (z + 2400.0) / (-700.0)));
    return -1.25 + t * 30.0;
  }

  const start = performance.now();
  let prevLogic = start;
  let prevRender = start;

  function loop(now) {
    const rawDt = Math.min(now - prevLogic, 50);
    prevLogic = now;
    const dtSec = rawDt * 0.001;

    const moveSpeed = state.moving ? 18.0 : 0.0;
    const speedNorm = moveSpeed / 18.0;

    if (state.moving) {
      state.z -= moveSpeed * dtSec;
      state.bobPhase += dtSec * 7.5;
    }

    const bobY = state.moving ? Math.sin(state.bobPhase * 2.0) * 0.07 : 0.0;
    const swayX = state.moving ? Math.sin(state.bobPhase) * 0.05 : 0.0;
    const rollLook = state.moving ? Math.sin(state.bobPhase) * 0.06 : 0.0;

    state.x = pathXjs(state.z) + swayX;
    state.y = pathYjs(state.z) + 3.85 + bobY;

    const lookSpeed = 0.90;
    state.yaw = state.lookX * lookSpeed + rollLook * 0.22;
    state.pitch = Math.max(-1.0, Math.min(1.0, -state.lookY * 0.52 - 0.05 + bobY * 0.08));

    if (now - prevRender >= FRAME_MS) {
      prevRender = now - ((now - prevRender) % FRAME_MS);

      gl.uniform2f(loc.resolution, canvas.width, canvas.height);
      gl.uniform1f(loc.time, (now - start) * 0.001);
      gl.uniform3f(loc.camPos, state.x, state.y, state.z);
      gl.uniform1f(loc.yaw, state.yaw);
      gl.uniform1f(loc.pitch, state.pitch);
      gl.uniform1f(loc.movePhase, state.bobPhase);
      gl.uniform1f(loc.speed, speedNorm);

      gl.drawArrays(gl.TRIANGLES, 0, 3);
    }

    requestAnimationFrame(loop);
  }

  reset();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
